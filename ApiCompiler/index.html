<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Compiler | Premium Online IDE</title>
    <meta name="description" content="A premium online code compiler for Python, C, C++, Java, and JavaScript. Run code instantly in your browser.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <i class="fas fa-microchip"></i>
                <h1>Nexus<span>IDE</span></h1>
            </div>
            <div class="controls">
                <div class="select-wrapper">
                    <i class="fas fa-code"></i>
                    <select id="language-select">
                        <option value="python">Python 3</option>
                        <option value="cpp">C++ (GCC)</option>
                        <option value="c">C (GCC)</option>
                        <option value="java">Java</option>
                        <option value="javascript">JavaScript</option>
                    </select>
                </div>
                <button id="run-btn" class="primary-btn">
                    <i class="fas fa-play"></i>
                    <span>Run Code</span>
                </button>
            </div>
        </header>

        <main>
            <div class="editor-section">
                <div class="section-header">
                    <div class="tab">
                        <i class="fas fa-file-code"></i>
                        <span id="current-filename">main.py</span>
                    </div>
                </div>
                <div class="editor-container">
                    <div class="line-numbers" id="line-numbers">
                        <span>1</span>
                    </div>
                    <textarea id="code-editor" spellcheck="false" placeholder="Write your code here..."></textarea>
                </div>
            </div>

            <div class="output-section">
                <div class="section-header">
                    <div class="tab">
                        <i class="fas fa-terminal"></i>
                        <span>Terminal Output</span>
                    </div>
                    <button id="clear-btn" title="Clear Console">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
                <div class="terminal" id="terminal">
                    <div class="output-line system-msg">Nexus Compiler initialized. Select a language and click Run.</div>
                </div>
            </div>
        </main>

        <footer>
            <div class="status">
                <span class="status-item"><i class="fas fa-wifi"></i> Online</span>
                <span class="status-item" id="char-count">Chars: 0</span>
            </div>
            <div class="branding">Powered by Piston API</div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
